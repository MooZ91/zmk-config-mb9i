# MBK9 Configuration
# 3x3 Matrix with Bluetooth, RGB, and VIA Support

# ==== Core Features ====
# Enable Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# Bluetooth Settings
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_DTM_HCI=y

# ==== RGB/LED Configuration ====
# Enable RGB underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812B_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=10
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=10
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=10
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=75

# RGB effects/animations enabled
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0

# ==== VIA/EEPROM Support ====
# Enable VIA support (requires EEPROM emulation)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=100

# ==== Matrix Configuration ====
# 3x3 matrix configuration (automatic, handled by hardware config)

# ==== Display Support (Optional) ====
# Uncomment to enable display support
# CONFIG_ZMK_DISPLAY=y
# CONFIG_SSD1306=y
# CONFIG_I2C=y

# ==== Battery/Power ====
# Power consumption optimization
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y

# ==== Debug Settings (Optional - comment out for production) ====
# CONFIG_ZMK_USB_LOGGING=y
# CONFIG_LOG=y

# ==== Memory and Performance ====
# Increase stack size if needed
CONFIG_MAIN_STACK_SIZE=2048

# ==== Behavior Options ====
# Enable combo keys
CONFIG_ZMK_COMBO=y
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=4

# ==== Build Optimization ====
CONFIG_SIZE_OPTIMIZATIONS=y

# ==== Additional Endpoints ====
# HID report IDs
CONFIG_ZMK_HID_KEYBOARD_REPORT_ID=1
